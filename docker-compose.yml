services:
  # MSSQL Database
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: todo-list-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  # SigNoz Infrastructure
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6-alpine
    container_name: signoz-clickhouse
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  signoz:
    image: signoz/signoz:latest
    container_name: signoz
    command: ["-config=/etc/signoz/connection.yaml"]
    volumes:
      - ./signoz/connection.yaml:/etc/signoz/connection.yaml
    environment:
      - ClickHouseUrl=tcp://clickhouse:9000
    ports:
      - "3301:8080" # UI on 8080 internal, mapped to 3301 for user consistency
    depends_on:
      clickhouse:
        condition: service_healthy

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.description=linux
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
    depends_on:
      clickhouse:
        condition: service_healthy

volumes:
  mssql-data:
  clickhouse-data:
